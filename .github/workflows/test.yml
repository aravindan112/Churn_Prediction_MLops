# ML Pipeline CI - Churn Prediction
name: ML Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn fastapi pydantic pytest

    - name: Test data loading
      run: |
        python -c "
        import pandas as pd
        df = pd.read_csv('data/processed/churn_cleaned.csv')
        assert df.shape[0] == 7043
        assert 'Churn' in df.columns
        print('Data test passed. Shape:', df.shape)
        "

    - name: Test preprocessor loads
      run: |
        python -c "
        import pickle
        with open('models/preprocessor.pkl', 'rb') as f:
            preprocessor = pickle.load(f)
        print('Preprocessor loaded:', type(preprocessor))
        "

    - name: Test model loads
      run: |
        python -c "
        import pickle
        with open('models/best_model.pkl', 'rb') as f:
            model = pickle.load(f)
        print('Model loaded:', type(model))
        "
